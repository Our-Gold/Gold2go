<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Van Life - Dashboard Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0f2f5; }
        .nav-bar { background-color: #bd731d; }
        .stat-card { background: white; border-radius: 16px; padding: 1.25rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-24">
    <div class="max-w-md mx-auto min-h-screen relative shadow-lg bg-white">
        <header class="p-6 bg-white border-b text-center">
            <h1 class="text-2xl font-bold text-gray-800">รายงานพอร์ต 📊</h1>
        </header>
        <div id="content" class="p-4 space-y-4">
            <div class="stat-card text-center border-t-4 border-yellow-500">
                <p class="text-xs text-gray-400 uppercase font-bold">กำไร/ขาดทุนสุทธิวันนี้</p>
                <p class="text-4xl font-black mt-2" id="total-profit">฿0</p>
                <div class="inline-flex items-center px-4 py-1 rounded-full mt-2 text-sm font-bold" id="profit-pct">0%</div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="stat-card"><p class="text-[10px] text-gray-400 uppercase font-bold">เงินลงทุนรวม</p><p class="text-xl font-bold text-blue-900" id="total-cap">฿0</p></div>
                <div class="stat-card"><p class="text-[10px] text-gray-400 uppercase font-bold">มูลค่าพอร์ตปัจจุบัน</p><p class="text-xl font-bold text-gray-800" id="total-val">฿0</p></div>
            </div>
            <div class="stat-card text-center">
                <p class="text-[10px] text-gray-400 font-bold mb-2">อ้างอิงราคา InterGOLD</p>
                <div class="flex justify-around"><p class="text-red-600 font-bold" id="live-buy">0</p><p class="text-green-600 font-bold" id="live-sell">0</p></div>
            </div>
        </div>
        <nav class="nav-bar fixed bottom-0 left-0 right-0 max-w-md mx-auto flex justify-around items-center p-4 text-white text-[10px] rounded-t-2xl z-30">
            <a href="dashboard.html" class="flex flex-col items-center font-bold text-white no-underline">📊<span>รายงาน</span></a>
            <a href="index.html" class="flex flex-col items-center opacity-60 text-white no-underline">📝<span>รายการทอง</span></a>
        </nav>
    </div>
    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxJHieUe3b1zFhNe_cNRI9carKqdErE2QZHgXIG7Zqy2VHe-ugBWIThZACex4YNBgFS9g/exec";
        async function load() {
            const pRes = await fetch(`${WEB_APP_URL}?page=live_price`);
            const pData = await pRes.json();
            const curBuy = parseFloat(pData.buy);
            document.getElementById('live-buy').innerText = "รับซื้อ: " + curBuy.toLocaleString();
            document.getElementById('live-sell').innerText = "ขายออก: " + Number(pData.sell).toLocaleString();
            const res = await fetch(`${WEB_APP_URL}?page=inventory`);
            const inv = await res.json();
            let cap = 0, profit = 0;
            inv.filter(i => i.status === "HOLDING").forEach(i => {
                const c = parseFloat(i.capital) || 0;
                const b = parseFloat(i.buy_price) || 0;
                cap += c;
                if (b > 0) profit += (curBuy - b) * (c / b);
            });
            document.getElementById('total-cap').innerText = `฿${Math.round(cap).toLocaleString()}`;
            document.getElementById('total-val').innerText = `฿${Math.round(cap + profit).toLocaleString()}`;
            const pElem = document.getElementById('total-profit');
            pElem.innerText = `${profit >= 0 ? '+' : ''}฿${Math.round(profit).toLocaleString()}`;
            pElem.className = `text-4xl font-black mt-2 ${profit >= 0 ? 'text-green-600' : 'text-red-600'}`;
            const pctElem = document.getElementById('profit-pct');
            const pct = cap > 0 ? (profit / cap) * 100 : 0;
            pctElem.innerText = `${pct.toFixed(2)}%`;
            pctElem.className = `inline-flex items-center px-4 py-1 rounded-full mt-2 text-sm font-bold ${profit >= 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
        }
        window.onload = load;
    </script>
</body>
</html>
