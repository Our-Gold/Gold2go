<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>รายการล็อตคงเหลือ - V1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8f9fa; -webkit-font-smoothing: antialiased; }
        .gold-card { transition: all 0.2s ease; border-radius: 16px; margin-bottom: 12px; }
        .nav-bar { background-color: #bd731d; } /* สีน้ำตาลตามรูป */
        .loader { border-top-color: #f1c40f; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-0 m-0">

    <div class="max-w-md mx-auto bg-white min-h-screen relative pb-16">
        
        <header class="flex justify-between items-center p-4 pt-10 border-b border-gray-100">
            <div class="flex items-center gap-2">
                <img src="https://raw.githubusercontent.com/KhunThom/VanLife_Assets/main/check-list_small.png" alt="icon" class="w-5 h-5">
                <h1 class="text-xl font-medium text-gray-900">รายการล็อตคงเหลือ</h1>
            </div>
            <button onclick="window.location.reload()" class="flex items-center gap-1 bg-gray-50 text-gray-500 border border-gray-200 px-3 py-1 rounded-md text-sm hover:bg-gray-100 transition">
                <span>🔄</span>
                รีเฟรช
            </button>
        </header>

        <div id="loading" class="flex flex-col items-center justify-center py-20 bg-white">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-100 h-10 w-10 mb-3"></div>
            <p class="text-xs text-gray-500">กำลังเชื่อมต่อข้อมูลเกษียณ...</p>
        </div>

        <div id="inventory-grid" class="p-3 hidden">
            </div>

        <nav class="nav-bar fixed bottom-0 left-0 right-0 max-w-md mx-auto flex justify-between items-center p-3 text-white rounded-t-lg shadow-lg z-50">
            <a href="#" class="flex-1 flex flex-col items-center gap-1 opacity-70">
                <span class="text-xl">📊</span>
                <span class="text-[10px]">รายงาน</span>
            </a>
            <a href="#" class="flex-1 flex flex-col items-center gap-1">
                <span class="text-xl">📝</span>
                <span class="text-[10px]">รายการทอง</span>
            </a>
            <a href="#" class="flex-1 flex flex-col items-center gap-1 opacity-70">
                <span class="text-xl">💡</span>
                <span class="text-[10px]">กลยุทธ์</span>
            </a>
            <a href="#" class="flex-1 flex flex-col items-center gap-1 opacity-70">
                <span class="text-xl">➕</span>
                <span class="text-[10px]">บันทึกซื้อ</span>
            </a>
        </nav>

    </div>

    <script>
        // URL Web App ของคุณต้อม (ห้ามเปลี่ยน)
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwxO6Gp-yzSF2QDlLRsm7-B31HmRHWRLD4qa-1KsvUHrMJPKUUsmXT9WqOMlN0UZFhAEg/exec";

        // ฟังก์ชันดึงข้อมูล
        async function fetchInventory() {
            try {
                const response = await fetch(`${WEB_APP_URL}?page=inventory`);
                const data = await response.json();
                
                // เรียงจาก Lot ID มากไปน้อย (ใหม่สุดอยู่บน)
                data.sort((a, b) => b.lot_id - a.lot_id);
                
                renderInventory(data);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('inventory-grid').classList.remove('hidden');
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('loading').innerHTML = "<p class='text-xs text-red-500 p-10'>ขออภัย เกิดข้อผิดพลาดในการโหลดข้อมูล</p>";
            }
        }

        // ฟังก์ชันสร้าง Card เลย์เอาต์ตามรูปภาพ 100%
        function renderInventory(data) {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = "";
            const currentGoldPrice = 43500; // สมมติราคาตลาดวันนี้

            data.forEach(item => {
                const isHolding = item.status === "HOLDING";
                const card = document.createElement('div');
                card.className = `gold-card bg-white p-5 shadow-md border-l-4 ${isHolding ? 'border-yellow-400' : 'border-gray-200'}`;
                
                // คำนวณกำไร/ขาดทุนปัจจุบัน
                let profitLoss = 0;
                let currentProfitPct = 0;
                if(isHolding && item.buy_price > 0){
                    currentProfitPct = ((currentGoldPrice - item.buy_price) / item.buy_price) * 100;
                    profitLoss = (currentGoldPrice - item.buy_price) / 40.8 * item.capital; // คำนวณกำไรสุทธิ
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-base font-semibold text-gray-800Lot">ล็อตที่ ${item.lot_id}</p>
                            <p class="text-[11px] text-gray-400 font-extralight mt-0.5">${new Date(item.updated_at).toLocaleString('th-TH', {day: 'numeric', month: 'short', year: 'numeric'})} | 📝 บันทึกคุณต้อม V1</p>
                        </div>
                        <div class="text-right flex items-center gap-2">
                            ${isHolding ? `
                                <span class="text-xs px-2 py-0.5 rounded-md font-medium flex items-center gap-0.5 ${currentProfitPct >= 0 ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'}">
                                    ${currentProfitPct >= 0 ? '▲' : '▼'} ${currentProfitPct.toFixed(2)}%
                                </span>
                                <button onclick="handleAction(${item.lot_id}, 'SELL')" class="bg-[#f0506e] text-white text-xs font-semibold px-4 py-1.5 rounded-full shadow-sm hover:bg-red-600">ขาย</button>
                            ` : `
                                <span class="text-xs px-2 py-0.5 rounded-md font-medium bg-gray-50 text-gray-400">ว่าง</span>
                                <button onclick="handleAction(${item.lot_id}, 'BUY')" class="bg-blue-600 text-white text-xs font-semibold px-4 py-1.5 rounded-full shadow-sm hover:bg-blue-700">ซื้อ</button>
                            `}
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-x-2 gap-y-1 mb-4">
                        <div>
                            <p class="text-xs text-blue-800Capital">เงินต้น: <span class="font-bold underline">฿${Number(item.capital).toLocaleString()}</span></p>
                            <p class="text-[11px] text-gray-400 font-light mt-1">ทุน/บาท: ${Number(item.buy_price).toLocaleString()}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-blue-800Capital">เป้า: <span class="font-semibold text-green-600">${item.target_pct}%</span></p>
                            ${isHolding ? `
                                <p class="text-[11px] ${currentProfitPct >= 0 ? 'text-green-600' : 'text-red-600'} font-semibold mt-1">
                                    ${currentProfitPct >= 0 ? '+' : ''}${Math.round(profitLoss).toLocaleString()}
                                </p>
                            ` : `<p class="text-[11px] text-gray-300 font-light mt-1">-</p>`}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function handleAction(lotId, type) {
            const actionText = type === 'SELL' ? 'ขาย' : 'ซื้อ';
            if(confirm(`ยืนยันการบันทึกข้อมูล ${actionText} ถาดที่ ${lotId}?`)) {
                alert(`กำลังพัฒนา...\n(กดใน Gold2Go แล้วค่อยมาอัปเดตสถานะในนี้ครับ)`);
            }
        }

        // เริ่มทำงานเมื่อโหลดหน้าเว็บ
        window.onload = fetchInventory;
    </script>
</body>
</html>
