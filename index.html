<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Van Life - คุณต้อม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8f9fa; }
        .nav-bar { background-color: #bd731d; }
        .gold-card { border-radius: 16px; border-left: 5px solid #e2e8f0; transition: 0.2s; margin-bottom: 12px; border: 1px solid #eee; }
        .holding { border-left-color: #fbbf24; background-color: #fff; }
        .available { border-left-color: #e2e8f0; background-color: #fafafa; }
        .loader { border-top-color: #bd731d; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24">
    <div class="max-w-md mx-auto bg-white min-h-screen relative shadow-inner">
        <header class="p-4 pt-10 border-b sticky top-0 bg-white z-20 shadow-sm">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-bold text-gray-800">ล็อตทองของคุณต้อม 🚐</h1>
                <button onclick="fetchInventory()" class="bg-gray-100 text-gray-600 px-3 py-1 rounded-lg text-xs font-medium">รีเฟรช 🔄</button>
            </div>
            <div class="bg-yellow-50 p-3 rounded-xl border border-yellow-200">
                <label class="text-[10px] text-yellow-700 font-bold uppercase tracking-wider">ราคาทองสมมติ (บาทละ):</label>
                <input type="number" id="mock-price" value="43500" oninput="renderInventory(currentData)" class="w-full mt-1 border border-yellow-300 rounded-lg px-4 py-2 text-xl font-bold text-yellow-800 focus:outline-none">
            </div>
        </header>

        <div id="loading" class="flex flex-col items-center justify-center p-20">
            <div class="loader rounded-full border-4 border-gray-100 h-12 w-12 mb-4"></div>
            <p class="text-sm text-gray-400 italic">กำลังเชื่อมต่อ...</p>
        </div>

        <div id="inventory-grid" class="p-3 hidden"></div>

        <nav class="nav-bar fixed bottom-0 left-0 right-0 max-w-md mx-auto flex justify-around items-center p-3 text-white text-[10px] rounded-t-2xl shadow-2xl z-30">
            <a href="dashboard.html" class="flex flex-col items-center opacity-60"><span>📊</span>รายงาน</a>
            <a href="index.html" class="flex flex-col items-center border-t-2 border-white pt-1"><span>📝</span>รายการทอง</a>
            <div class="flex flex-col items-center opacity-60"><span>➕</span>บันทึกซื้อ</div>
        </nav>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz7jUUG8T408H0xxguj-2ED6OgGIKvu_0Gfixg4L9qw2h4qBPU6vQ-ZtV9mXXA9Duspjw/exec"; 
        let currentData = [];

        async function fetchInventory() {
            try {
                document.getElementById('loading').classList.remove('hidden');
                document.getElementById('inventory-grid').classList.add('hidden');
                const res = await fetch(`${WEB_APP_URL}?page=inventory`);
                currentData = await res.json();
                currentData.sort((a, b) => b.lot_id - a.lot_id);
                renderInventory(currentData);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('inventory-grid').classList.remove('hidden');
            } catch (e) { alert("โหลดข้อมูลขัดข้อง"); }
        }

        function renderInventory(data) {
            const grid = document.getElementById('inventory-grid');
            const mockPrice = parseFloat(document.getElementById('mock-price').value) || 0;
            grid.innerHTML = "";
            data.forEach(item => {
                const isHolding = item.status === "HOLDING";
                const buyPrice = parseFloat(item.buy_price) || 0;
                const diffPct = isHolding ? ((mockPrice - buyPrice) / buyPrice) * 100 : 0;
                
                const card = document.createElement('div');
                card.className = `gold-card p-4 shadow-sm ${isHolding ? 'holding' : 'available'}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <p class="font-bold text-gray-800">ล็อตที่ ${item.lot_id}</p>
                        <div class="flex items-center gap-2">
                            ${isHolding ? `<span class="text-[10px] px-2 py-0.5 rounded-md font-bold ${diffPct >= 0 ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">${diffPct >= 0 ? '▲' : '▼'} ${Math.abs(diffPct).toFixed(2)}%</span>` : ''}
                            <button onclick="handleAction(${item.lot_id}, '${isHolding ? 'SELL' : 'BUY'}', ${item.capital})" class="${isHolding ? 'bg-red-500' : 'bg-blue-600'} text-white px-5 py-1.5 rounded-full text-xs font-bold shadow-md">
                                ${isHolding ? 'ขาย' : 'ซื้อ'}
                            </button>
                        </div>
                    </div>
                    <div class="mt-4 flex justify-between items-end text-xs">
                        <p class="text-blue-900 font-bold">ทุน: ฿${Number(item.capital).toLocaleString()}</p>
                        <p class="text-gray-400 italic">ทุน/บาท: ${Number(item.buy_price).toLocaleString()}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function handleAction(lotId, type, capital) {
            if (type === 'BUY') {
                const cap = prompt(`ล็อตที่ ${lotId}: ระบุเงินต้น (บาท)`, "10000");
                const price = prompt(`ล็อตที่ ${lotId}: ราคาทองขณะซื้อ (บาทละ)`, document.getElementById('mock-price').value);
                if (cap && price) await send({ action: "BUY", lotId, capital: cap, buyPrice: price });
            } else {
                const rec = prompt(`ล็อตที่ ${lotId}: เงินต้นคือ ฿${capital.toLocaleString()}\nระบุยอดเงินที่ขายได้จริง (รวมต้น+กำไร):`, "");
                if (rec) {
                    const profit = parseFloat(rec) - capital - 10;
                    if (confirm(`ยืนยันการบันทึกขายล็อตที่ ${lotId}\nเงินต้น: ฿${capital.toLocaleString()}\nยอดขาย: ฿${parseFloat(rec).toLocaleString()}\nกำไรสุทธิ: ฿${profit.toLocaleString()}\n(หักค่าธรรมเนียม 10 บาทแล้ว)`)) {
                        await send({ action: "SELL", lotId, totalReceived: rec });
                    }
                }
            }
        }

        async function send(payload) {
            document.getElementById('loading').classList.remove('hidden');
            const res = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await res.json();
            if (result.status === "success") {
                alert(`✅ บันทึกล็อตที่ ${payload.lotId} เรียบร้อยแล้ว!\nระบบได้อัปเดตประวัติการขายให้คุณต้อมแล้วครับ`);
                fetchInventory();
            }
        }

        window.onload = fetchInventory;
    </script>
</body>
</html>
