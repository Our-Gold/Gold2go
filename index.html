<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Van Life - Real Dual Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8f9fa; }
        .nav-bar { background-color: #bd731d; }
        .gold-card { border-radius: 12px; border-left: 4px solid #e2e8f0; margin-bottom: 8px; border: 1px solid #eee; }
        .holding { border-left-color: #fbbf24; background-color: #fff; }
    </style>
</head>
<body class="pb-20">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-sm">
        <header class="p-3 pt-8 border-b sticky top-0 bg-white z-20">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-lg font-bold text-gray-800 italic">ล็อตทองคุณต้อม 🚐</h1>
                <button onclick="fetchInventory()" class="text-blue-500 text-[10px] font-bold">Refresh 🔄</button>
            </div>
            
            <div class="grid grid-cols-2 gap-2">
                <div class="bg-red-50 p-2 rounded-lg border border-red-100">
                    <p class="text-[9px] text-red-600 font-bold">ราคารับซื้อ (SELL TO SHOP):</p>
                    <input type="number" id="buy-price-now" value="0" class="w-full bg-transparent text-xl font-bold text-red-700 focus:outline-none">
                </div>
                <div class="bg-green-50 p-2 rounded-lg border border-green-100">
                    <p class="text-[9px] text-green-600 font-bold">ราคาขายออก (BUY FROM SHOP):</p>
                    <input type="number" id="sell-price-now" value="0" class="w-full bg-transparent text-xl font-bold text-green-700 focus:outline-none">
                </div>
            </div>
        </header>

        <div id="loading" class="p-10 text-center text-gray-400 text-xs italic">กำลังซิงค์ราคาคู่...</div>
        <div id="inventory-grid" class="p-2 hidden"></div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxJHieUe3b1zFhNe_cNRI9carKqdErE2QZHgXIG7Zqy2VHe-ugBWIThZACex4YNBgFS9g/exec"; 
        let currentData = [];

        async function fetchInventory() {
            try {
                document.getElementById('loading').classList.remove('hidden');
                
                // 1. ดึงราคาคู่ Buy/Sell
                const pRes = await fetch(`${WEB_APP_URL}?page=live_price`);
                const pData = await pRes.json();
                document.getElementById('buy-price-now').value = pData.buy;
                document.getElementById('sell-price-now').value = pData.sell;

                // 2. ดึงพอร์ต
                const res = await fetch(`${WEB_APP_URL}?page=inventory`);
                currentData = await res.json();
                renderInventory(currentData);
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('inventory-grid').classList.remove('hidden');
            } catch (e) { document.getElementById('loading').innerHTML = "Error Syncing!"; }
        }

        function renderInventory(data) {
            const grid = document.getElementById('inventory-grid');
            const realBuyBack = parseFloat(document.getElementById('buy-price-now').value); // ราคาที่เราจะเอาไปขายคืนร้าน
            grid.innerHTML = "";
            
            data.filter(item => item.status === "HOLDING").forEach(item => {
                const myCost = parseFloat(item.buy_price) || 0;
                const cap = parseFloat(item.capital) || 0;
                // คำนวณกำไรจาก "ราคารับซื้อของร้าน"
                const diff = myCost > 0 ? ((realBuyBack - myCost) / myCost) * 100 : 0;
                const profit = myCost > 0 ? (realBuyBack - myCost) * (cap / myCost) : 0;
                const d = new Date(item.updated_at);
                const dateStr = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543}`;

                const card = document.createElement('div');
                card.className = `gold-card p-2 px-3 holding shadow-sm`;
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="w-1/4">
                            <p class="text-[8px] text-gray-400 uppercase">${dateStr}</p>
                            <p class="text-[11px] font-bold text-gray-800">LOT ${item.lot_id}</p>
                        </div>
                        <div class="w-1/3 text-center border-l">
                            <p class="text-[8px] text-gray-400">ทุน ฿${cap.toLocaleString()}</p>
                            <p class="text-[10px] font-bold text-blue-900">@ ${myCost.toLocaleString()}</p>
                        </div>
                        <div class="w-1/3 text-right">
                            <p class="text-[8px] text-gray-400 uppercase">ถ้าขายตอนนี้</p>
                            <p class="text-[12px] font-bold ${diff >= 0 ? 'text-green-600' : 'text-red-600'} leading-none">฿${Math.round(cap + profit).toLocaleString()}</p>
                            <p class="text-[9px] font-bold ${diff >= 0 ? 'text-green-500' : 'text-red-500'} mt-1">${diff.toFixed(1)}%</p>
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
        }

        window.onload = fetchInventory;
    </script>
</body>
</html>
