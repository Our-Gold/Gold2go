<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>รายการล็อตคงเหลือ - คุณต้อม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8f9fa; pb-24; }
        .nav-bar { background-color: #bd731d; }
        .gold-card { border-radius: 16px; border-left: 5px solid #e2e8f0; transition: 0.2s; margin-bottom: 12px; }
        .holding { border-left-color: #fbbf24; }
    </style>
</head>
<body class="p-0 m-0">
    <div class="max-w-md mx-auto bg-white min-h-screen relative pb-20">
        <header class="p-4 pt-10 border-b sticky top-0 bg-white z-10">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-xl font-medium">📋 รายการล็อตคงเหลือ</h1>
                <button onclick="fetchInventory()" class="text-blue-500 text-xs">รีเฟรช 🔄</button>
            </div>
            <div class="bg-yellow-50 p-3 rounded-xl border border-yellow-200">
                <label class="text-[10px] text-yellow-700 font-bold uppercase">จำลองราคาทองปัจจุบัน (บาทละ):</label>
                <input type="number" id="mock-price" value="43500" oninput="renderInventory(currentData)" 
                    class="w-full mt-1 border border-yellow-300 rounded-lg px-3 py-2 text-lg font-bold text-yellow-800">
            </div>
        </header>

        <div id="loading" class="p-20 text-center text-gray-400 text-xs">กำลังโหลดข้อมูล...</div>
        <div id="inventory-grid" class="p-3 hidden"></div>

        <nav class="nav-bar fixed bottom-0 left-0 right-0 max-w-md mx-auto flex justify-around p-3 text-white text-[10px] rounded-t-xl shadow-2xl">
            <a href="dashboard.html" class="flex flex-col items-center opacity-60"><span>📊</span>รายงาน</a>
            <a href="index.html" class="flex flex-col items-center"><span>📝</span>รายการทอง</a>
            <div class="flex flex-col items-center opacity-60"><span>➕</span>บันทึกซื้อ</div>
        </nav>
    </div>

    <script>
        const WEB_APP_URL = "ใส่_URL_WEB_APP_ของคุณต้อมที่นี่";
        let currentData = [];

        async function fetchInventory() {
            const res = await fetch(`${WEB_APP_URL}?page=inventory`);
            currentData = await res.json();
            currentData.sort((a, b) => b.lot_id - a.lot_id);
            renderInventory(currentData);
            document.getElementById('loading').className = "hidden";
            document.getElementById('inventory-grid').className = "p-3";
        }

        function renderInventory(data) {
            const grid = document.getElementById('inventory-grid');
            const mockPrice = parseFloat(document.getElementById('mock-price').value) || 0;
            grid.innerHTML = "";

            data.forEach(item => {
                const isHolding = item.status === "HOLDING";
                const buyPrice = parseFloat(item.buy_price) || 0;
                const diffPct = isHolding ? ((mockPrice - buyPrice) / buyPrice) * 100 : 0;
                
                const card = document.createElement('div');
                card.className = `gold-card bg-white p-4 shadow-sm border ${isHolding ? 'holding' : ''}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-semibold text-gray-800">ล็อตที่ ${item.lot_id}</p>
                            <p class="text-[10px] text-gray-400">${new Date(item.updated_at).toLocaleDateString('th-TH')}</p>
                        </div>
                        <div class="text-right">
                            ${isHolding ? `<span class="text-[10px] px-2 py-0.5 rounded-md font-bold ${diffPct >= 0 ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">${diffPct >= 0 ? '▲' : '▼'} ${Math.abs(diffPct).toFixed(2)}%</span>` : ''}
                            <button onclick="handleAction(${item.lot_id}, '${isHolding ? 'SELL' : 'BUY'}')" class="ml-2 ${isHolding ? 'bg-red-500' : 'bg-blue-600'} text-white px-4 py-1 rounded-full text-xs font-bold">${isHolding ? 'ขาย' : 'ซื้อ'}</button>
                        </div>
                    </div>
                    <div class="mt-3 flex justify-between text-xs">
                        <p class="text-blue-900">เงินต้น: <span class="font-bold underline">฿${Number(item.capital).toLocaleString()}</span></p>
                        <p class="text-gray-500">ทุน/บาท: ${Number(item.buy_price).toLocaleString()}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function handleAction(lotId, type) {
            if (type === 'BUY') {
                const cap = prompt("จำนวนเงินลงทุน (บาท):", "10000");
                const price = prompt("ราคาทองขณะซื้อ (บาทละ):", document.getElementById('mock-price').value);
                if (cap && price) send({ action: "BUY", lotId, capital: cap, buyPrice: price });
            } else {
                const rec = prompt("ยอดเงินที่ขายได้จริง (ต้น+กำไร):", "");
                if (rec) send({ action: "SELL", lotId, totalReceived: rec });
            }
        }

        async function send(payload) {
            await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
            alert("บันทึกสำเร็จ!");
            fetchInventory();
        }

        window.onload = fetchInventory;
    </script>
</body>
</html>
