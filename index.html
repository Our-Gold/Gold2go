<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Van Life - คุณต้อม (Final)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8f9fa; }
        .nav-bar { background-color: #bd731d; }
        .gold-card { border-radius: 12px; border-left: 4px solid #e2e8f0; transition: 0.2s; margin-bottom: 8px; border: 1px solid #eee; }
        .holding { border-left-color: #fbbf24; background-color: #fff; }
        .new-lot { border-left-color: #3b82f6; border-style: dashed; background-color: #eff6ff; }
    </style>
</head>
<body class="pb-20">
    <div class="max-w-md mx-auto bg-white min-h-screen relative shadow-md">
        <header class="p-3 pt-8 border-b sticky top-0 bg-white z-20 shadow-sm">
            <div class="flex justify-between items-center mb-2">
                <h1 class="text-lg font-bold text-gray-800 italic">ล็อตทองคุณต้อม 🚐</h1>
                <button onclick="fetchInventory()" class="text-blue-500 text-[10px] font-bold uppercase">Refresh 🔄</button>
            </div>
            <div class="bg-yellow-50 p-2 rounded-lg border border-yellow-200 flex items-center gap-3">
                <label class="text-[9px] text-yellow-700 font-bold uppercase leading-tight">ราคาตลาด<br>จำลอง:</label>
                <input type="number" id="mock-price" value="43500" oninput="renderInventory(currentData)" class="flex-1 bg-white border border-yellow-300 rounded px-2 py-1 text-base font-bold text-yellow-800 focus:outline-none">
            </div>
        </header>

        <div id="loading" class="p-10 text-center text-gray-400 text-xs italic">กำลังเชื่อมต่อข้อมูล...</div>
        <div id="inventory-grid" class="p-2 hidden"></div>

        <nav class="nav-bar fixed bottom-0 left-0 right-0 max-w-md mx-auto flex justify-around items-center p-2 text-white text-[9px] rounded-t-xl shadow-2xl z-30">
            <a href="dashboard.html" class="flex flex-col items-center opacity-60 text-white no-underline"><span>📊</span>รายงาน</a>
            <a href="index.html" class="flex flex-col items-center font-bold text-white no-underline"><span>📝</span>รายการทอง</a>
            <div class="flex flex-col items-center opacity-60"><span>➕</span>บันทึกซื้อ</div>
        </nav>
    </div>

    <script>
        // บรรทัดที่ 84: วาง URL ของคุณต้อมที่นี่
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxqg9KynGwmVEBHUeeGsAv5OxV8fPuMcAWzHYFkp3Rp6BOpZVFQ5M8ebnC2wVUbwwLsvA/exec"; 
        let currentData = [];

        async function fetchInventory() {
            try {
                document.getElementById('loading').classList.remove('hidden');
                document.getElementById('inventory-grid').classList.add('hidden');
                const res = await fetch(`${WEB_APP_URL}?page=inventory`);
                currentData = await res.json();
                
                if(!Array.isArray(currentData)) currentData = [];
                renderInventory(currentData);
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('inventory-grid').classList.remove('hidden');
            } catch (e) { 
                document.getElementById('loading').innerHTML = "Error: ไม่สามารถโหลดข้อมูลได้";
            }
        }

        function renderInventory(data) {
            const grid = document.getElementById('inventory-grid');
            const mockPrice = parseFloat(document.getElementById('mock-price').value) || 0;
            grid.innerHTML = "";

            // หา Max ID แบบปลอดภัย (ถ้าไม่มีข้อมูลให้เริ่มที่ 0)
            let maxLotId = 0;
            if (data.length > 0) {
                const ids = data.map(item => parseInt(item.lot_id) || 0);
                maxLotId = Math.max(...ids);
            }

            // 1. ปุ่มเปิดล็อตใหม่ (Next Lot)
            renderNewLotButton(grid, maxLotId + 1);

            // 2. แสดงล็อตที่ถือทองอยู่ (เรียงล่าสุดขึ้นก่อน)
            const holdingData = data.filter(item => item.status === "HOLDING");
            holdingData.sort((a, b) => b.lot_id - a.lot_id);

            holdingData.forEach(item => {
                renderCard(grid, item, mockPrice);
            });
        }

        function renderCard(grid, item, mockPrice) {
            const buyPrice = parseFloat(item.buy_price) || 0;
            const capital = parseFloat(item.capital) || 0;
            const diffPct = ((mockPrice - buyPrice) / buyPrice) * 100;
            const profitAmt = (mockPrice - buyPrice) * (capital / buyPrice);
            const currentTotal = capital + profitAmt;

            const card = document.createElement('div');
            card.className = `gold-card p-2 px-3 shadow-sm holding`;
            card.innerHTML = `
                <div class="flex justify-between items-center">
                    <div class="w-1/4">
                        <p class="text-[11px] font-bold text-gray-800">LOT ${item.lot_id}</p>
                        <p class="text-[8px] text-yellow-600 font-medium italic">HOLDING</p>
                    </div>
                    <div class="w-1/3 text-center border-l border-gray-100">
                        <p class="text-[8px] text-gray-400 uppercase leading-none">เงินลงทุน</p>
                        <p class="text-[13px] font-bold text-blue-900 leading-none mt-1">฿${Number(capital).toLocaleString()}</p>
                        <p class="text-[8px] text-gray-400 mt-1">ทุน: ${Number(buyPrice).toLocaleString()}</p>
                    </div>
                    <div class="w-1/3 text-right">
                        <p class="text-[8px] text-gray-400 uppercase leading-none">มูลค่าวันนี้</p>
                        <p class="text-[13px] font-bold ${diffPct >= 0 ? 'text-green-600' : 'text-red-600'} leading-none mt-1">
                            ฿${Math.round(currentTotal).toLocaleString()}
                        </p>
                        <p class="text-[8px] font-bold mt-1 ${diffPct >= 0 ? 'text-green-500' : 'text-red-500'}">
                            ${diffPct >= 0 ? '+' : ''}${Math.round(profitAmt)} (${diffPct.toFixed(1)}%)
                        </p>
                    </div>
                    <div class="ml-2">
                        <button onclick="handleAction(${item.lot_id}, 'SELL', ${capital}, ${currentTotal.toFixed(0)})" 
                            class="bg-red-500 text-white w-12 py-2 rounded-lg text-[10px] font-bold shadow-sm uppercase active:scale-95 transition">ขาย</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        }

        function renderNewLotButton(grid, nextLotId) {
            const btn = document.createElement('div');
            btn.className = `gold-card p-3 px-4 shadow-sm new-lot mb-4`;
            btn.innerHTML = `
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-[11px] font-bold text-blue-800 tracking-tight">เปิด LOT ${nextLotId} (ถาดถัดไป)</p>
                        <p class="text-[8px] text-blue-400 italic">พร้อมขยายพอร์ตครับ 🚐</p>
                    </div>
                    <button onclick="handleAction(${nextLotId}, 'BUY')" 
                        class="bg-blue-600 text-white px-6 py-2 rounded-lg text-[10px] font-bold shadow-md uppercase active:scale-90 transition">ซื้อทองเพิ่ม</button>
                </div>
            `;
            grid.appendChild(btn);
        }

        async function handleAction(lotId, type, capital, estTotal) {
            if (type === 'BUY') {
                const cap = prompt(`LOT ${lotId}: ลงเงินต้นกี่บาท?`, "10000");
                const price = prompt(`LOT ${lotId}: ราคาทองขณะซื้อ?`, document.getElementById('mock-price').value);
                if (cap && price) await send({ action: "BUY", lotId, capital: cap, buyPrice: price });
            } else {
                const rec = prompt(`LOT ${lotId}: ขายจริงได้เงินรวมเท่าไหร่?`, estTotal);
                if (rec) {
                    const profit = parseFloat(rec) - capital - 10;
                    if (confirm(`ยืนยันการขาย LOT ${lotId}\nกำไรสุทธิ: ฿${profit.toLocaleString()}\n(หักค่าธรรมเนียม 10 บาทแล้ว)`)) {
                        await send({ action: "SELL", lotId, totalReceived: rec });
                    }
                }
            }
        }

        async function send(payload) {
            document.getElementById('loading').classList.remove('hidden');
            const res = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await res.json();
            if (result.status === "success") { fetchInventory(); }
        }

        window.onload = fetchInventory;
    </script>
</body>
</html>
