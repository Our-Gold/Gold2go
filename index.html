<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Van Life - Real Price Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8f9fa; }
        .nav-bar { background-color: #bd731d; }
        .gold-card { border-radius: 12px; border-left: 4px solid #e2e8f0; transition: 0.2s; margin-bottom: 8px; border: 1px solid #eee; position: relative; }
        .holding { border-left-color: #fbbf24; background-color: #fff; }
        .btn-mute { position: absolute; top: -5px; right: -5px; background: #64748b; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; display: flex; align-items: center; justify-content: center; border: 2px solid white; z-index: 10; }
    </style>
</head>
<body class="pb-20">
    <div class="max-w-md mx-auto bg-white min-h-screen relative shadow-sm">
        <header class="p-3 pt-8 border-b sticky top-0 bg-white z-20 shadow-sm">
            <div class="flex justify-between items-center mb-2">
                <h1 class="text-lg font-bold text-gray-800 italic">ล็อตทองคุณต้อม 🚐</h1>
                <button onclick="fetchInventory()" class="text-blue-500 text-[10px] font-bold uppercase tracking-wider">Refresh 🔄</button>
            </div>
            <div class="bg-yellow-50 p-2 rounded-lg border border-yellow-200 flex items-center gap-3">
                <label class="text-[9px] text-yellow-700 font-bold uppercase leading-tight" id="price-label">ราคาตลาดสด:</label>
                <input type="number" id="mock-price" value="0" oninput="updateMockPrice(this.value)" class="flex-1 bg-white border border-yellow-300 rounded px-2 py-1 text-xl font-bold text-yellow-800 focus:outline-none">
            </div>
        </header>

        <div id="loading" class="p-10 text-center text-gray-400 text-xs italic font-light">กำลังซิงค์ราคาจริง 72,xxx...</div>
        <div id="inventory-grid" class="p-2 hidden"></div>

        <nav class="nav-bar fixed bottom-0 left-0 right-0 max-w-md mx-auto flex justify-around items-center p-2 text-white text-[9px] rounded-t-xl shadow-2xl z-30">
            <a href="dashboard.html" class="flex flex-col items-center opacity-60 text-white no-underline"><span>📊</span>รายงาน</a>
            <a href="index.html" class="flex flex-col items-center font-bold text-white no-underline"><span>📝</span>รายการทอง</a>
            <div class="flex flex-col items-center opacity-60"><span>➕</span>บันทึกซื้อ</div>
        </nav>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxwlLKIlmbHC1uDKDlSp-duUKPX4amAlp_A1PZLhqJrIKRwQNLXZJi9Rl8dtswYjyfxaQ/exec"; 
        let currentData = [];

        function updateMockPrice(val) {
            fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ currentMockPrice: val }) });
            renderInventory(currentData);
        }

        async function fetchInventory() {
            try {
                document.getElementById('loading').classList.remove('hidden');
                
                // ดึงราคาสดจากสมาคมฯ ผ่าน Server
                const priceRes = await fetch(`${WEB_APP_URL}?page=live_price`);
                const priceData = await priceRes.json();
                if(priceData.price && priceData.price > 10000) {
                    document.getElementById('mock-price').value = priceData.price;
                }

                const res = await fetch(`${WEB_APP_URL}?page=inventory`);
                currentData = await res.json();
                renderInventory(currentData);
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('inventory-grid').classList.remove('hidden');
            } catch (e) { document.getElementById('loading').innerHTML = "Sync Error!"; }
        }

        function formatDateShort(dateString) {
            if (!dateString || dateString === 0 || dateString === "0") return "-";
            const date = new Date(dateString);
            return `${date.getDate()}/${date.getMonth() + 1}/${date.getFullYear() + 543}`;
        }

        function renderInventory(data) {
            const grid = document.getElementById('inventory-grid');
            const mockPrice = parseFloat(document.getElementById('mock-price').value) || 0;
            grid.innerHTML = "";
            let maxLotId = 0;
            if (data.length > 0) {
                maxLotId = Math.max(...data.map(item => parseInt(item.lot_id) || 0));
            }
            
            data.filter(item => item.status === "HOLDING").sort((a, b) => b.lot_id - a.lot_id).forEach(item => {
                const buyP = parseFloat(item.buy_price) || 0;
                const cap = parseFloat(item.capital) || 0;
                const diff = buyP > 0 ? ((mockPrice - buyP) / buyP) * 100 : 0;
                const profit = buyP > 0 ? (mockPrice - buyP) * (cap / buyP) : 0;
                const dateShort = formatDateShort(item.updated_at); 

                const card = document.createElement('div');
                card.className = `gold-card p-2 px-3 shadow-sm holding`;
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="w-1/4">
                            <p class="text-[8px] text-gray-400 uppercase mb-1">${dateShort}</p>
                            <p class="text-[11px] font-bold text-gray-800">LOT ${item.lot_id}</p>
                        </div>
                        <div class="w-1/3 text-center border-l border-gray-100">
                            <p class="text-[8px] text-gray-400 uppercase">ลงทุน</p>
                            <p class="text-[13px] font-bold text-blue-900 leading-none mt-1">฿${Number(cap).toLocaleString()}</p>
                            <p class="text-[8px] text-gray-400 mt-1 leading-none">@ ${Number(buyP).toLocaleString()}</p>
                        </div>
                        <div class="w-1/3 text-right">
                            <p class="text-[8px] text-gray-400 uppercase">มูลค่าวันนี้</p>
                            <p class="text-[13px] font-bold ${diff >= 0 ? 'text-green-600' : 'text-red-600'} leading-none mt-1">฿${Math.round(cap + profit).toLocaleString()}</p>
                            <p class="text-[8px] font-bold mt-1 ${diff >= 0 ? 'text-green-500' : 'text-red-500'}">${diff >= 0 ? '+' : ''}${Math.round(profit).toLocaleString()} (${diff.toFixed(1)}%)</p>
                        </div>
                        <div class="ml-2"><button class="bg-red-500 text-white w-12 py-2 rounded-lg text-[10px] font-bold shadow-sm">ขาย</button></div>
                    </div>`;
                grid.appendChild(card);
            });
        }

        window.onload = fetchInventory;
    </script>
</body>
</html>
