<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwxO6Gp-yzSF2QDlLRsm7-B31HmRHWRLD4qa-1KsvUHrMJPKUUsmXT9WqOMlN0UZFhAEg/exec"; 
    let currentData = [];

    async function fetchInventory() {
        try {
            document.getElementById('loading').classList.remove('hidden');
            const res = await fetch(`${WEB_APP_URL}?page=inventory`);
            currentData = await res.json();
            
            // 1. เรียงลำดับจากมากไปน้อย (ล่าสุดอยู่บน)
            currentData.sort((a, b) => b.lot_id - a.lot_id);
            
            renderInventory(currentData);
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('inventory-grid').classList.remove('hidden');
        } catch (e) { alert("Error!"); }
    }

    function renderInventory(data) {
        const grid = document.getElementById('inventory-grid');
        const mockPrice = parseFloat(document.getElementById('mock-price').value) || 0;
        grid.innerHTML = "";

        // --- เพิ่ม Logic ล็อตถัดไป ---
        // หาค่า Lot ID ที่สูงที่สุดในระบบ
        const maxLotId = Math.max(...data.map(item => item.lot_id));
        
        data.forEach(item => {
            // โชว์เฉพาะล็อตที่มีสถานะ HOLDING (ถือทอง)
            // ส่วนล็อตที่เป็น AVAILABLE (ว่าง) จะไม่แสดงแบบเก่า แต่จะแสดงเป็นช่อง "รอซื้อถาดใหม่" ด้านบนแทน
            if (item.status === "HOLDING") {
                renderCard(grid, item, mockPrice);
            }
        });

        // 2. สร้าง "ปุ่มเปิดล็อตใหม่" ไว้ด้านบนสุดเสมอ
        renderNewLotButton(grid, maxLotId + 1);
    }

    function renderCard(grid, item, mockPrice) {
        const buyPrice = parseFloat(item.buy_price) || 0;
        const capital = parseFloat(item.capital) || 0;
        const diffPct = ((mockPrice - buyPrice) / buyPrice) * 100;
        const profitAmt = (mockPrice - buyPrice) * (capital / buyPrice);
        const currentTotal = capital + profitAmt;

        const card = document.createElement('div');
        card.className = `gold-card p-3 px-4 shadow-sm holding`;
        card.innerHTML = `
            <div class="flex justify-between items-center">
                <div class="w-1/4">
                    <p class="text-[12px] font-bold text-gray-800 uppercase tracking-tighter">LOT ${item.lot_id}</p>
                    <p class="text-[8px] text-yellow-600 font-medium">ถือทอง</p>
                </div>
                <div class="w-1/3 text-center">
                    <p class="text-[8px] text-gray-400 uppercase">เงินลงทุน</p>
                    <p class="text-[14px] font-bold text-blue-900 leading-none">฿${Number(capital).toLocaleString()}</p>
                    <p class="text-[8px] text-gray-400 mt-1">ทุน: ${Number(buyPrice).toLocaleString()}</p>
                </div>
                <div class="w-1/3 text-right">
                    <p class="text-[8px] text-gray-400 uppercase">มูลค่าวันนี้</p>
                    <p class="text-[14px] font-bold ${diffPct >= 0 ? 'text-green-600' : 'text-red-600'} leading-none">
                        ฿${Math.round(currentTotal).toLocaleString()}
                    </p>
                    <p class="text-[9px] font-bold mt-1 ${diffPct >= 0 ? 'text-green-500' : 'text-red-500'}">
                        ${diffPct >= 0 ? '+' : ''}${Math.round(profitAmt)} (${diffPct.toFixed(1)}%)
                    </p>
                </div>
                <div class="ml-2">
                    <button onclick="handleAction(${item.lot_id}, 'SELL', ${capital}, ${currentTotal.toFixed(0)})" 
                        class="bg-red-500 text-white px-3 py-2 rounded-lg text-[10px] font-bold shadow-md uppercase">ขาย</button>
                </div>
            </div>
        `;
        grid.appendChild(card);
    }

    function renderNewLotButton(grid, nextLotId) {
        const btn = document.createElement('div');
        btn.className = `gold-card p-3 px-4 shadow-sm border-dashed border-2 border-blue-200 bg-blue-50 mb-4`;
        btn.innerHTML = `
            <div class="flex justify-between items-center">
                <div class="w-1/2">
                    <p class="text-[12px] font-bold text-blue-800">เตรียมเปิด LOT ${nextLotId}</p>
                    <p class="text-[8px] text-blue-500 font-light italic">เงินเย็นพร้อมทำงาน 🚐</p>
                </div>
                <button onclick="handleAction(${nextLotId}, 'BUY')" 
                    class="bg-blue-600 text-white px-6 py-2 rounded-lg text-[10px] font-bold shadow-md uppercase">ซื้อเพิ่ม</button>
            </div>
        `;
        // เอาไปแทรกไว้บนสุดของ grid
        grid.prepend(btn);
    }

    // ฟังก์ชันส่งข้อมูล (ใช้ตัวเดิมที่คุณต้อมมีได้เลยครับ)
    async function send(payload) {
        document.getElementById('loading').classList.remove('hidden');
        const res = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.status === "success") { 
            alert(`✅ ดำเนินการ LOT ${payload.lotId} สำเร็จ!`); 
            fetchInventory(); 
        }
    }

    window.onload = fetchInventory;
</script>
