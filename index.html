<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Van Life - Buy Workflow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f3f4f6; }
        .nav-bar { background-color: #bd731d; }
    </style>
</head>
<body class="pb-24">
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-lg relative">
        <header class="p-4 pt-8 border-b sticky top-0 bg-white z-20">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-bold text-gray-800">ล็อตทองคุณต้อม 🚐</h1>
                <button onclick="fetchInventory()" class="text-blue-500 text-xs font-bold">RELOAD 🔄</button>
            </div>
            <div class="bg-yellow-50 p-4 rounded-2xl border-2 border-yellow-200">
                <p class="text-[10px] text-yellow-600 font-bold uppercase mb-1">ราคาตลาดจำลอง (Gold2Go)</p>
                <input type="number" id="mock-price" 
                       class="w-full bg-transparent text-3xl font-bold text-yellow-800 focus:outline-none"
                       onkeydown="if(event.key==='Enter') updateMockPrice(this.value)">
            </div>
        </header>

        <div id="loading" class="p-10 text-center text-gray-400 italic">กำลังเชื่อมต่อข้อมูล...</div>
        <div id="inventory-grid" class="p-4 space-y-3"></div>

        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-white border-t z-30">
            <button onclick="startBuyWorkflow()" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform flex justify-center items-center gap-2">
                <span>➕</span> บันทึกการซื้อใหม่
            </button>
        </nav>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyuXxG7qUllwBw4IN2o-O9s2NOnfJQnBxOTdn5O8gpWOV0nvUV6SArADjp5EpPeD7P83A/exec";
        let currentData = [];

        async function fetchInventory() {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const pRes = await fetch(`${WEB_APP_URL}?page=live_price`);
                const pData = await pRes.json();
                document.getElementById('mock-price').value = pData.price;

                const res = await fetch(`${WEB_APP_URL}?page=inventory`);
                currentData = await res.json();
                renderInventory(currentData, pData.price);
                document.getElementById('loading').classList.add('hidden');
            } catch (e) { alert("โหลดข้อมูลไม่สำเร็จ"); }
        }

        function renderInventory(data, mockPrice) {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = "";
            data.filter(item => item.status === "HOLDING").sort((a, b) => b.lot_id - a.lot_id).forEach(item => {
                const buyP = parseFloat(item.buy_price) || 0;
                const cap = parseFloat(item.capital) || 0;
                const weight = parseFloat(item.weight) || 0;
                const diff = ((mockPrice - buyP) / buyP) * 100;
                
                grid.innerHTML += `
                    <div class="bg-white border rounded-xl p-3 shadow-sm flex justify-between items-center">
                        <div>
                            <p class="text-[10px] text-gray-400">LOT ${item.lot_id}</p>
                            <p class="text-sm font-bold text-gray-700">฿${cap.toLocaleString()}</p>
                            <p class="text-[9px] text-gray-500">${weight.toFixed(4)} บาททอง</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs font-bold ${diff >= 0 ? 'text-green-600' : 'text-red-600'}">${diff >= 0 ? '+' : ''}${diff.toFixed(2)}%</p>
                            <p class="text-[10px] text-gray-400">@ ${buyP.toLocaleString()}</p>
                        </div>
                    </div>`;
            });
        }

        // --- ระบบ Workflow การซื้อที่คุณต้อมต้องการ ---
        async function startBuyWorkflow() {
            // 1. หาเลข Lot ล่าสุด
            let nextLot = 1;
            if (currentData.length > 0) {
                const lastLot = Math.max(...currentData.map(d => parseInt(d.lot_id) || 0));
                nextLot = lastLot + 1;
            }

            // 2. ถามเลข Lot (Auto-fill)
            const lotId = prompt("ขั้นตอนที่ 1/3: ยืนยันหมายเลข LOT", nextLot);
            if (!lotId) return;

            // 3. ถามจำนวนเงิน (Default 10,000)
            const capital = prompt("ขั้นตอนที่ 2/3: จำนวนเงินลงทุน (บาท)", "10000");
            if (!capital) return;

            // 4. ถามราคาทอง (Default ราคาตลาดจำลอง)
            const currentPrice = document.getElementById('mock-price').value;
            const buyPrice = prompt("ขั้นตอนที่ 3/3: ราคาทองที่ซื้อจริง (Gold2Go)", currentPrice);
            if (!buyPrice) return;

            // 5. คำนวณน้ำหนักทองแบบละเอียด (Capital / BuyPrice)
            const weight = (parseFloat(capital) / parseFloat(buyPrice)).toFixed(6);

            // 6. ยืนยันครั้งสุดท้าย
            const confirmMsg = `ยืนยันการบันทึก:\n------------------\nLOT: ${lotId}\nทุน: ฿${Number(capital).toLocaleString()}\nราคา: ฿${Number(buyPrice).toLocaleString()}\nน้ำหนัก: ${weight} บาท\n------------------\nบันทึกหรือไม่?`;
            
            if (confirm(confirmMsg)) {
                document.getElementById('loading').classList.remove('hidden');
                await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "BUY",
                        lotId: lotId,
                        capital: capital,
                        buyPrice: buyPrice,
                        weight: weight
                    })
                });
                fetchInventory();
            }
        }

        async function updateMockPrice(val) {
            await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ currentMockPrice: val }) });
            fetchInventory();
        }

        window.onload = fetchInventory;
    </script>
</body>
</html>
