<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>รายการล็อตคงเหลือ - คุณต้อม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8f9fa; }
        .nav-bar { background-color: #bd731d; }
        .gold-card { border-radius: 15px; border-left: 5px solid #e2e8f0; transition: 0.2s; margin-bottom: 12px; }
        .holding { border-left-color: #fbbf24; }
        .loader { border-top-color: #bd731d; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
        <header class="p-4 pt-10 border-b flex justify-between items-center bg-white sticky top-0 z-10">
            <h1 class="text-xl font-medium flex items-center gap-2">📋 รายการล็อตคงเหลือ</h1>
            <button onclick="fetchInventory()" class="bg-gray-100 px-3 py-1 rounded-md text-xs text-gray-600">รีเฟรช 🔄</button>
        </header>

        <div id="loading" class="p-20 flex flex-col items-center">
            <div class="loader rounded-full border-4 border-gray-100 h-10 w-10 mb-2"></div>
            <p class="text-xs text-gray-400">กำลังเชื่อมต่อฐานข้อมูล...</p>
        </div>

        <div id="inventory-grid" class="p-3 hidden"></div>

        <nav class="nav-bar fixed bottom-0 left-0 right-0 max-w-md mx-auto flex justify-around p-3 text-white text-[10px] rounded-t-xl shadow-2xl z-50">
            <a href="dashboard.html" class="flex flex-col items-center opacity-60">
                <span class="text-xl">📊</span>
                <span>รายงาน</span>
            </a>
            <a href="index.html" class="flex flex-col items-center">
                <span class="text-xl">📝</span>
                <span>รายการทอง</span>
            </a>
            <div class="flex flex-col items-center opacity-60">
                <span class="text-xl">💡</span>
                <span>กลยุทธ์</span>
            </div>
            <div class="flex flex-col items-center opacity-60" onclick="alert('กรุณาเลือกถาดที่ว่างเพื่อบันทึกซื้อ')">
                <span class="text-xl">➕</span>
                <span>บันทึกซื้อ</span>
            </div>
        </nav>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwxO6Gp-yzSF2QDlLRsm7-B31HmRHWRLD4qa-1KsvUHrMJPKUUsmXT9WqOMlN0UZFhAEg/exec";

        async function fetchInventory() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('inventory-grid').classList.add('hidden');
            try {
                const res = await fetch(`${WEB_APP_URL}?page=inventory`);
                let data = await res.json();
                data.sort((a, b) => b.lot_id - a.lot_id);
                render(data);
            } catch (e) { alert("ดึงข้อมูลไม่สำเร็จ"); }
        }

        function render(data) {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = "";
            data.forEach(item => {
                const isHolding = item.status === "HOLDING";
                const card = document.createElement('div');
                card.className = `gold-card bg-white p-5 shadow-sm border ${isHolding ? 'holding' : ''}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="font-semibold text-gray-800">ล็อตที่ ${item.lot_id}</p>
                            <p class="text-[10px] text-gray-400 mt-1">${new Date(item.updated_at).toLocaleDateString('th-TH')} | V.2026</p>
                        </div>
                        <button onclick="handleAction(${item.lot_id}, '${isHolding ? 'SELL' : 'BUY'}')" 
                                class="${isHolding ? 'bg-[#f0506e]' : 'bg-blue-600'} text-white px-6 py-1.5 rounded-full text-xs font-bold shadow-md">
                            ${isHolding ? 'ขาย' : 'ซื้อ'}
                        </button>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-xs">
                        <div>
                            <p class="text-gray-400 text-[10px] uppercase">เงินต้นที่ลง</p>
                            <p class="font-bold text-blue-900 underline text-sm">฿${Number(item.capital || 0).toLocaleString()}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-gray-400 text-[10px] uppercase">เป้ากำไร</p>
                            <p class="${isHolding ? 'text-green-600 font-bold' : 'text-gray-300'} text-sm">${item.target_pct}%</p>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('inventory-grid').classList.remove('hidden');
        }

        async function handleAction(lotId, type) {
            if (type === 'BUY') {
                const cap = prompt("ระบุจำนวนเงินที่จ่ายจริง (บาท):", "10000");
                const price = prompt("ราคาทองบาทละ (ตอนที่ซื้อ):", "42000");
                if (cap && price) await send({ action: "BUY", lotId, capital: cap, buyPrice: price });
            } else {
                const rec = prompt("ยอดเงินรวมที่ได้รับจริง (รวมต้น+กำไร):", "");
                if (rec) await send({ action: "SELL", lotId, totalReceived: rec });
            }
        }

        async function send(payload) {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('inventory-grid').classList.add('hidden');
            try {
                const res = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
                const result = await res.json();
                if (result.status === "success") { fetchInventory(); }
            } catch (e) { alert("บันทึกไม่สำเร็จ"); fetchInventory(); }
        }

        window.onload = fetchInventory;
    </script>
</body>
</html>
