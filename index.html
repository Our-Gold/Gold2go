<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Van Life - Fix NaN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8f9fa; }
        .nav-bar { background-color: #bd731d; }
        .gold-card { border-radius: 12px; border-left: 4px solid #e2e8f0; margin-bottom: 10px; border: 1px solid #eee; position: relative; }
        .holding { border-left-color: #fbbf24; background-color: #fff; }
    </style>
</head>
<body class="pb-24">
    <div class="max-w-md mx-auto bg-white min-h-screen relative shadow-sm">
        <header class="p-4 pt-8 border-b sticky top-0 bg-white z-20 shadow-sm">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-bold text-gray-800 italic text-center w-full">Gold2Go Direct Sync 🚐</h1>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-red-50 p-2 rounded-xl border border-red-100 text-center">
                    <p class="text-[10px] text-red-600 font-bold uppercase">ราคาขายคืน (SHOP BUY)</p>
                    <p class="text-2xl font-bold text-red-700" id="buy-price">0</p>
                </div>
                <div class="bg-green-50 p-2 rounded-xl border border-green-100 text-center">
                    <p class="text-[10px] text-green-600 font-bold mb-1 uppercase">ราคาเข้าซื้อ (SHOP SELL)</p>
                    <p class="text-2xl font-bold text-green-700" id="sell-price">0</p>
                </div>
            </div>
        </header>
        <div id="inventory-grid" class="p-3"></div>
        <nav class="nav-bar fixed bottom-0 left-0 right-0 max-w-md mx-auto flex justify-around items-center p-3 text-white text-[10px] rounded-t-2xl shadow-2xl z-30">
            <a href="dashboard.html" class="flex flex-col items-center opacity-60 text-white">📊<span>รายงาน</span></a>
            <a href="index.html" class="flex flex-col items-center font-bold text-white">📝<span>รายการทอง</span></a>
            <button onclick="fetchInventory()" class="flex flex-col items-center">➕<span>Refresh</span></button>
        </nav>
    </div>
    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxJHieUe3b1zFhNe_cNRI9carKqdErE2QZHgXIG7Zqy2VHe-ugBWIThZACex4YNBgFS9g/exec"; 
        async function fetchInventory() {
            try {
                const pRes = await fetch(`${WEB_APP_URL}?page=live_price`);
                const pData = await pRes.json();
                const curBuy = parseFloat(pData.buy) || 72600;
                const curSell = parseFloat(pData.sell) || 72800;
                document.getElementById('buy-price').innerText = curBuy.toLocaleString();
                document.getElementById('sell-price').innerText = curSell.toLocaleString();
                const res = await fetch(`${WEB_APP_URL}?page=inventory`);
                const data = await res.json();
                renderInventory(data, curBuy);
            } catch (e) { alert("Sync Error!"); }
        }
        function renderInventory(data, curBuy) {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = "";
            data.filter(item => item.status === "HOLDING").forEach(item => {
                const buyP = parseFloat(item.buy_price) || 0;
                const cap = parseFloat(item.capital) || 0;
                const diff = buyP > 0 ? ((curBuy - buyP) / buyP) * 100 : 0;
                const profit = buyP > 0 ? (curBuy - buyP) * (cap / buyP) : 0;
                const d = new Date(item.updated_at);
                const dateStr = isNaN(d.getTime()) ? "-" : `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543}`;
                const card = document.createElement('div');
                card.className = `gold-card p-3 px-4 holding shadow-sm`;
                card.innerHTML = `<div class="flex justify-between items-center">
                    <div class="w-1/4"><p class="text-[9px] text-gray-400 mb-1">${dateStr}</p><p class="text-xs font-bold">LOT ${item.lot_id}</p></div>
                    <div class="w-1/3 text-center border-l border-gray-100"><p class="text-[9px] text-gray-400 uppercase">เงินลงทุน</p><p class="text-sm font-bold text-blue-900">฿${cap.toLocaleString()}</p><p class="text-[9px] text-gray-400">@ ${buyP.toLocaleString()}</p></div>
                    <div class="w-1/3 text-right"><p class="text-[9px] text-gray-400 uppercase">มูลค่าวันนี้</p><p class="text-sm font-bold ${diff >= 0 ? 'text-green-600' : 'text-red-600'}">฿${Math.round(cap + profit).toLocaleString()}</p><p class="text-[10px] font-bold ${diff >= 0 ? 'text-green-500' : 'text-red-500'}">${diff >= 0 ? '+' : ''}${diff.toFixed(1)}%</p></div>
                </div>`;
                grid.appendChild(card);
            });
        }
        window.onload = fetchInventory;
    </script>
</body>
</html>
