<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gold Van Life - Mobile Optimized</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #f8f9fa;
            /* ป้องกันการเลื่อนซ้ายขวาที่ไม่ได้ตั้งใจ */
            overflow-x: hidden; 
        }
        .nav-bar { 
            background-color: #bd731d;
            /* รองรับขอบจอ iPhone ที่มีขีดด้านล่าง (Safe Area) */
            padding-bottom: env(safe-area-inset-bottom);
        }
        .gold-card { 
            border-radius: 12px; 
            border-left: 5px solid #fbbf24; 
            background: #fff; 
            transition: 0.2s; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        /* ปรับแต่ง Scrollbar ให้ดูสะอาดตา */
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="pb-24">
    <div class="w-full max-w-md mx-auto min-h-screen relative bg-white shadow-sm">
        
        <header class="p-4 pt-6 border-b sticky top-0 bg-white z-20 shadow-sm">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-lg md:text-xl font-bold text-gray-800 italic flex items-center gap-2">
                    ล็อตทองคุณต้อม 🚐
                </h1>
                <button onclick="fetchInventory()" class="text-blue-500 text-[10px] font-bold uppercase border border-blue-100 px-2 py-1 rounded-md active:bg-blue-50">
                    Refresh 🔄
                </button>
            </div>

            <div class="bg-yellow-50 p-3 rounded-2xl border border-yellow-200 flex items-center gap-3 w-full">
                <div class="flex-shrink-0">
                    <p class="text-[9px] text-yellow-700 font-bold leading-tight uppercase">ราคาตลาด<br>จำลอง:</p>
                </div>
                <input type="number" id="mock-price" 
                       class="w-full bg-white border border-yellow-300 rounded-xl px-3 py-2 text-2xl md:text-3xl font-bold text-yellow-800 focus:outline-none focus:ring-2 focus:ring-yellow-400" 
                       onkeydown="if(event.key==='Enter') updateMockPrice(this.value)">
            </div>
            <p class="text-[8px] text-gray-400 mt-2 text-center italic font-medium">
                * พิมพ์ราคาแล้วกด ENTER เพื่อบันทึกค่าลงฐานข้อมูล
            </p>
        </header>

        <div id="loading" class="p-10 text-center text-gray-400 text-xs italic">กำลังซิงค์ข้อมูล...</div>
        <div id="inventory-grid" class="p-3 space-y-3">
            </div>

        <nav class="nav-bar fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto flex justify-around items-stretch p-2 text-white shadow-[0_-4px_10px_rgba(0,0,0,0.1)] z-30 rounded-t-2xl">
            <a href="dashboard.html" class="flex flex-col items-center justify-center py-1 w-1/3 opacity-70 no-underline text-white">
                <span class="text-xl">📊</span>
                <span class="text-[10px] font-medium">รายงาน</span>
            </a>
            <a href="index.html" class="flex flex-col items-center justify-center py-1 w-1/3 no-underline text-white border-x border-white/10">
                <span class="text-xl">📝</span>
                <span class="text-[10px] font-bold">รายการทอง</span>
            </a>
            <button onclick="startBuyWorkflow()" class="flex flex-col items-center justify-center py-1 w-1/3 hover:bg-white/10 transition-colors">
                <span class="text-xl">➕</span>
                <span class="text-[10px] font-medium">ซื้อเพิ่ม</span>
            </button>
        </nav>
    </div>

    <div id="confirm-modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 hidden bg-black/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-xs rounded-3xl overflow-hidden shadow-2xl scale-95 transition-transform">
            <div class="bg-orange-600 p-4 text-white text-center">
                <h3 class="font-bold text-lg">ตรวจสอบข้อมูลซื้อ</h3>
            </div>
            <div class="p-5 space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div class="col-span-2">
                        <label class="text-[10px] text-gray-400 uppercase font-bold">หมายเลข LOT</label>
                        <input type="number" id="edit-lot" class="w-full border-b-2 py-1 font-bold text-lg outline-none focus:border-orange-500">
                    </div>
                    <div class="col-span-2">
                        <label class="text-[10px] text-gray-400 uppercase font-bold">เงินลงทุน (บาท)</label>
                        <input type="number" id="edit-capital" class="w-full border-b-2 py-1 font-bold text-lg outline-none focus:border-orange-500" oninput="calculateEditWeight()">
                    </div>
                    <div class="col-span-2">
                        <label class="text-[10px] text-gray-400 uppercase font-bold">ราคาทองที่ซื้อ</label>
                        <input type="number" id="edit-price" class="w-full border-b-2 py-1 font-bold text-lg outline-none focus:border-orange-500" oninput="calculateEditWeight()">
                    </div>
                </div>
                <div class="bg-orange-50 p-3 rounded-2xl text-center border border-orange-100">
                    <p class="text-[10px] text-orange-600 font-bold uppercase mb-1">น้ำหนักทองคำ</p>
                    <p id="edit-weight-display" class="text-2xl font-black text-orange-700">0.000000</p>
                    <p class="text-[10px] text-orange-400 uppercase">บาททอง</p>
                </div>
            </div>
            <div class="flex border-t">
                <button onclick="closeModal()" class="w-1/2 p-4 text-gray-400 font-bold hover:bg-gray-50 active:bg-gray-100">ยกเลิก</button>
                <button onclick="submitBuy()" class="w-1/2 p-4 text-orange-600 font-black hover:bg-orange-50 active:bg-orange-100 border-l">บันทึก</button>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyuXxG7qUllwBw4IN2o-O9s2NOnfJQnBxOTdn5O8gpWOV0nvUV6SArADjp5EpPeD7P83A/exec";
        let currentData = [];

        async function fetchInventory() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('inventory-grid').classList.add('hidden');
            try {
                const pRes = await fetch(`${WEB_APP_URL}?page=live_price`);
                const pData = await pRes.json();
                document.getElementById('mock-price').value = pData.price;
                const res = await fetch(`${WEB_APP_URL}?page=inventory`);
                currentData = await res.json();
                renderInventory(currentData, pData.price);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('inventory-grid').classList.remove('hidden');
            } catch (e) { document.getElementById('loading').innerText = "Sync Error ❌"; }
        }

        function renderInventory(data, mockPrice) {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = "";
            data.filter(item => item.status === "HOLDING").sort((a, b) => b.lot_id - a.lot_id).forEach(item => {
                const buyP = parseFloat(item.buy_price) || 0;
                const cap = parseFloat(item.capital) || 0;
                const weight = parseFloat(item.weight) || 0;
                const diff = buyP > 0 ? ((mockPrice - buyP) / buyP) * 100 : 0;
                const profit = buyP > 0 ? (mockPrice - buyP) * (cap / buyP) : 0;
                const date = new Date(item.updated_at);
                const dateStr = `${date.getDate()}/${date.getMonth()+1}/${date.getFullYear()+543}`;

                grid.innerHTML += `
                    <div class="gold-card p-3 border border-gray-100 shadow-sm">
                        <div class="flex justify-between items-center">
                            <div class="w-1/4">
                                <p class="text-[9px] text-gray-400 font-medium">${dateStr}</p>
                                <p class="text-xs font-bold text-gray-800">LOT ${item.lot_id}</p>
                                <p class="text-[8px] text-gray-400 mt-1 leading-none">${weight.toFixed(6)} บาท</p>
                            </div>
                            <div class="w-1/3 text-center border-l border-gray-100 px-1">
                                <p class="text-[9px] text-gray-400 uppercase leading-none mb-1">ลงทุน</p>
                                <p class="text-sm font-bold text-blue-900">฿${cap.toLocaleString()}</p>
                                <p class="text-[8px] text-gray-400 mt-1 leading-none">@ ${buyP.toLocaleString()}</p>
                            </div>
                            <div class="w-1/3 text-right">
                                <p class="text-[9px] text-gray-400 uppercase leading-none mb-1">มูลค่ารวม</p>
                                <p class="text-sm font-bold ${diff >= 0 ? 'text-green-600' : 'text-red-600'}">฿${Math.round(cap + profit).toLocaleString()}</p>
                                <p class="text-[10px] font-bold ${diff >= 0 ? 'text-green-500' : 'text-red-500'} mt-1">
                                    ${diff >= 0 ? '+' : ''}${diff.toFixed(2)}%
                                </p>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function startBuyWorkflow() {
            let nextLot = 1;
            if (currentData.length > 0) nextLot = Math.max(...currentData.map(d => parseInt(d.lot_id) || 0)) + 1;
            document.getElementById('edit-lot').value = nextLot;
            document.getElementById('edit-capital').value = 10000;
            document.getElementById('edit-price').value = document.getElementById('mock-price').value;
            calculateEditWeight();
            document.getElementById('confirm-modal').classList.remove('hidden');
        }

        function calculateEditWeight() {
            const cap = document.getElementById('edit-capital').value;
            const price = document.getElementById('edit-price').value;
            const weight = (parseFloat(cap) / parseFloat(price)).toFixed(6);
            document.getElementById('edit-weight-display').innerText = isNaN(weight) ? "0.000000" : weight;
        }

        function closeModal() { document.getElementById('confirm-modal').classList.add('hidden'); }

        async function submitBuy() {
            const lotId = document.getElementById('edit-lot').value;
            const capital = document.getElementById('edit-capital').value;
            const buyPrice = document.getElementById('edit-price').value;
            const weight = (parseFloat(capital) / parseFloat(buyPrice)).toFixed(6);
            closeModal();
            document.getElementById('loading').classList.remove('hidden');
            await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({ action: "BUY", lotId: lotId, capital: capital, buyPrice: buyPrice, weight: weight })
            });
            fetchInventory();
        }

        async function updateMockPrice(val) {
            await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ currentMockPrice: val }) });
            fetchInventory();
        }
        window.onload = fetchInventory;
    </script>
</body>
</html>
