<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Van Life Manager (Compact)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f4f6f8; -webkit-font-smoothing: antialiased; }
        .gold-card { transition: all 0.2s ease; }
        /* สไตล์หมุนโหลด */
        .loader { border-top-color: #f1c40f; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* ปรับปรุงระบบ Grid ให้กระชับ */
        #inventory-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        @media (max-width: 380px) { #inventory-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="p-2 md:p-4">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-4 bg-white p-3 rounded-xl shadow-sm border border-gray-100">
            <div>
                <h1 class="text-lg font-bold text-gray-800">Gold Van Life 🚐</h1>
                <p class="text-xs text-gray-500">พอร์ตทองคุณต้อม (ฉบับกระชับ)</p>
            </div>
            <div class="text-right bg-yellow-50 p-2 rounded-lg border border-yellow-100">
                <span id="market-price" class="text-base font-semibold text-yellow-700">Loading...</span>
                <p class="text-[9px] text-yellow-600 uppercase tracking-wider">ราคาตลาด</p>
            </div>
        </header>

        <nav class="flex gap-2 mb-4">
            <a href="index.html" class="flex-1 text-center bg-yellow-500 text-white text-xs py-2 rounded-lg shadow font-medium">จัดการถาด</a>
            <a href="dashboard.html" class="flex-1 text-center bg-white text-gray-600 text-xs py-2 rounded-lg shadow-sm hover:bg-gray-50 border border-gray-100 font-medium">รายงาน</a>
        </nav>

        <div id="loading" class="flex flex-col items-center justify-center py-10 bg-white rounded-xl shadow-sm border border-gray-100">
            <div class="loader ease-linear rounded-full border-2 border-t-2 border-gray-200 h-8 w-8 mb-3"></div>
            <p class="text-xs text-gray-500">กำลังดึงข้อมูลฐานข้อมูล...</p>
        </div>

        <div id="inventory-grid" class="hidden">
            </div>
    </div>

    <script>
        // URL Web App ของคุณต้อม (ห้ามเปลี่ยน)
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwxO6Gp-yzSF2QDlLRsm7-B31HmRHWRLD4qa-1KsvUHrMJPKUUsmXT9WqOMlN0UZFhAEg/exec";

        // ฟังก์ชันดึงข้อมูล
        async function fetchInventory() {
            try {
                const response = await fetch(`${WEB_APP_URL}?page=inventory`);
                const data = await response.json();
                
                // --- ทีเด็ด: เรียงลำดับจาก Lot ID มากไปน้อย ---
                data.sort((a, b) => b.lot_id - a.lot_id);
                
                renderInventory(data);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('inventory-grid').classList.remove('hidden');
                // ราคาตลาดจำลอง
                document.getElementById('market-price').innerText = "฿43,500";
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('loading').innerHTML = "<p class='text-xs text-red-500 p-4'>เกิดข้อผิดพลาดในการเชื่อมต่อ</p>";
            }
        }

        // ฟังก์ชันสร้าง Card แบบ Compact (เล็กลง 50%)
        function renderInventory(data) {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = "";

            data.forEach(item => {
                const isHolding = item.status === "HOLDING";
                const card = document.createElement('div');
                // ปรับสไตล์ Card ให้เล็กลงและสลิม
                card.className = `gold-card bg-white rounded-xl shadow-sm overflow-hidden border-l-4 ${isHolding ? 'border-yellow-400' : 'border-gray-200'} border border-gray-100`;
                
                card.innerHTML = `
                    <div class="p-3">
                        <div class="flex justify-between items-center mb-2 pb-1 border-b border-gray-50">
                            <span class="text-[10px] font-bold text-gray-500">LOT: ${item.lot_id}</span>
                            <span class="px-2 py-0.5 rounded-md text-[9px] font-medium ${isHolding ? 'bg-yellow-50 text-yellow-700' : 'bg-gray-50 text-gray-400'}">
                                ${isHolding ? 'มีทอง' : 'ว่าง'}
                            </span>
                        </div>
                        
                        <div class="flex justify-between items-end mb-2">
                            <div>
                                <p class="text-[9px] text-gray-400">เงินต้น</p>
                                <p class="text-sm font-bold text-gray-800">฿${Number(item.capital).toLocaleString()}</p>
                            </div>
                            ${isHolding ? `<span class="text-[10px] font-bold text-green-600">${item.target_pct}% เป้า</span>` : ''}
                        </div>

                        ${isHolding ? `
                            <div class="text-[10px] text-gray-600 bg-gray-50 p-1.5 rounded-lg mb-2">
                                ทุน: ฿${Number(item.buy_price).toLocaleString()}
                            </div>
                            <button onclick="handleAction(${item.lot_id}, 'SELL')" class="w-full bg-red-50 text-red-600 text-[10px] py-1.5 rounded-lg font-medium hover:bg-red-100">แจ้งขาย</button>
                        ` : `
                            <button onclick="handleAction(${item.lot_id}, 'BUY')" class="w-full bg-blue-500 text-white text-[10px] py-1.5 rounded-lg font-medium hover:bg-blue-600 shadow-sm">บันทึกซื้อ</button>
                        `}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function handleAction(lotId, type) {
            const actionText = type === 'SELL' ? 'ขาย' : 'ซื้อ';
            if(confirm(`ยืนยันการบันทึกข้อมูล ${actionText} ถาดที่ ${lotId}?`)) {
                alert(`กำลังพัฒนาตัวบันทึก...\n(กดใน Gold2Go แล้วค่อยมาอัปเดตสถานะในนี้ครับ)`);
            }
        }

        // เริ่มทำงาน
        window.onload = fetchInventory;
    </script>
</body>
</html>
