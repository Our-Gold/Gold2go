<header class="p-4 pt-10 border-b bg-white">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-xl font-medium flex items-center gap-2">📋 รายการล็อตคงเหลือ</h1>
        <button onclick="fetchInventory()" class="text-blue-500 text-sm italic">รีเฟรช 🔄</button>
    </div>
    
    <div class="bg-yellow-50 p-3 rounded-xl border border-yellow-200">
        <label class="text-[10px] text-yellow-700 font-bold uppercase">ตั้งราคาทองสมมติ (เพื่อทดสอบกำไร):</label>
        <div class="flex gap-2 mt-1">
            <input type="number" id="mock-price" value="43500" oninput="updateCalculations()" 
                class="flex-1 border border-yellow-300 rounded-lg px-3 py-2 text-sm font-bold text-yellow-800 focus:outline-none focus:ring-2 focus:ring-yellow-500">
            <div class="bg-yellow-500 text-white px-3 py-2 rounded-lg text-xs flex items-center">บาท</div>
        </div>
        <p class="text-[9px] text-yellow-600 mt-1">* เปลี่ยนตัวเลขด้านบนเพื่อดูการขยับของกำไรในแต่ละถาด</p>
    </div>
</header>

<script>
// เพิ่มฟังก์ชันนี้ในส่วน Script ของ index.html ครับ
function updateCalculations() {
    const mockPrice = parseFloat(document.getElementById('mock-price').value) || 0;
    const cards = document.querySelectorAll('.gold-card');
    
    cards.forEach(card => {
        const buyPrice = parseFloat(card.getAttribute('data-buy-price')) || 0;
        const capital = parseFloat(card.getAttribute('data-capital')) || 0;
        const status = card.getAttribute('data-status');

        if (status === "HOLDING" && buyPrice > 0) {
            const diffPct = ((mockPrice - buyPrice) / buyPrice) * 100;
            const profitAmt = (mockPrice - buyPrice) / 40.8 * (capital / 10000 * 40.8); // คำนวณกำไรโดยประมาณ
            
            // อัปเดตการแสดงผลใน Card (ต้องระบุ ID หรือ Class เจาะจงในหน้าจอ)
            const pctLabel = card.querySelector('.profit-pct');
            const amtLabel = card.querySelector('.profit-amt');
            
            if(pctLabel) {
                pctLabel.innerText = `${diffPct >= 0 ? '▲' : '▼'} ${Math.abs(diffPct).toFixed(2)}%`;
                pctLabel.className = `profit-pct text-[10px] px-2 py-0.5 rounded-md font-medium ${diffPct >= 0 ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'}`;
            }
            if(amtLabel) {
                amtLabel.innerText = `${diffPct >= 0 ? '+' : ''}${Math.round(mockPrice - buyPrice)}`; // โชว์ส่วนต่างราคา/บาท
                amtLabel.className = `profit-amt text-[11px] font-semibold ${diffPct >= 0 ? 'text-green-600' : 'text-red-600'}`;
            }
        }
    });
}
</script>
