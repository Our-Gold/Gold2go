<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Van Life Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0f2f5; }
        .gold-card { transition: transform 0.2s; }
        .gold-card:hover { transform: translateY(-5px); }
        .loader { border-top-color: #f1c40f; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Gold Van Life 🚐</h1>
                <p class="text-gray-500 text-sm">ระบบบริหารจัดการถาดทองคำของคุณต้อม</p>
            </div>
            <div class="text-right">
                <span id="market-price" class="text-xl font-semibold text-yellow-600">กำลังโหลดราคา...</span>
                <p class="text-xs text-gray-400">ราคาตลาดโดยประมาณ</p>
            </div>
        </header>

        <nav class="flex gap-4 mb-6">
            <a href="index.html" class="bg-yellow-500 text-white px-6 py-2 rounded-full shadow-md font-medium">จัดการถาดทอง</a>
            <a href="dashboard.html" class="bg-white text-gray-600 px-6 py-2 rounded-full shadow-sm hover:bg-gray-50 font-medium">รายงานกำไร</a>
        </nav>

        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
            <p class="text-gray-500">กำลังดึงข้อมูลจาก Google Sheets...</p>
        </div>

        <div id="inventory-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwxO6Gp-yzSF2QDlLRsm7-B31HmRHWRLD4qa-1KsvUHrMJPKUUsmXT9WqOMlN0UZFhAEg/exec";

        // ฟังก์ชันดึงข้อมูลจาก Google Sheets
        async function fetchInventory() {
            try {
                const response = await fetch(`${WEB_APP_URL}?page=inventory`);
                const data = await response.json();
                renderInventory(data);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('inventory-grid').classList.remove('hidden');
                // อัปเดตราคาสมมติในหน้าจอ
                document.getElementById('market-price').innerText = "฿43,500";
            } catch (error) {
                console.error("Error fetching data:", error);
                alert("ไม่สามารถดึงข้อมูลได้ กรุณาเช็กการตั้งค่า Deployment ใน Apps Script");
            }
        }

        // ฟังก์ชันสร้าง Card ถาดทอง
        function renderInventory(data) {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = "";

            data.forEach(item => {
                const isHolding = item.status === "HOLDING";
                const card = document.createElement('div');
                card.className = `gold-card bg-white rounded-2xl shadow-sm overflow-hidden border-t-4 ${isHolding ? 'border-yellow-500' : 'border-gray-300'}`;
                
                card.innerHTML = `
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-xs font-bold uppercase tracking-wider text-gray-400">ถาดที่ ${item.lot_id}</span>
                            <span class="px-3 py-1 rounded-full text-xs font-medium ${isHolding ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-500'}">
                                ${isHolding ? '● มีทองในมือ' : '○ ถาดว่าง'}
                            </span>
                        </div>
                        
                        <div class="mb-4">
                            <p class="text-xs text-gray-400">เงินต้น</p>
                            <p class="text-xl font-bold text-gray-800">฿${Number(item.capital).toLocaleString()}</p>
                        </div>

                        ${isHolding ? `
                            <div class="grid grid-cols-2 gap-4 mb-6">
                                <div>
                                    <p class="text-xs text-gray-400">ทุน/บาท</p>
                                    <p class="text-sm font-semibold text-gray-700">฿${Number(item.buy_price).toLocaleString()}</p>
                                </div>
                                <div>
                                    <p class="text-xs text-gray-400">เป้ากำไร</p>
                                    <p class="text-sm font-semibold text-green-600">${item.target_pct}%</p>
                                </div>
                            </div>
                            <button onclick="handleAction(${item.lot_id}, 'SELL')" class="w-full bg-red-50 text-red-600 py-3 rounded-xl font-semibold hover:bg-red-100 transition">แจ้งขายถาดนี้</button>
                        ` : `
                            <div class="py-4 mb-2 text-center border-2 border-dashed border-gray-100 rounded-xl">
                                <p class="text-sm text-gray-400">รอกดซื้อเมื่อราคาย่อ</p>
                            </div>
                            <button onclick="handleAction(${item.lot_id}, 'BUY')" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 shadow-lg shadow-blue-200 transition">บันทึกการซื้อ</button>
                        `}
                    </div>
                    <div class="bg-gray-50 px-6 py-3 border-t border-gray-100">
                        <p class="text-[10px] text-gray-400 uppercase tracking-widest">Update: ${new Date(item.updated_at).toLocaleString('th-TH')}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function handleAction(lotId, type) {
            const actionText = type === 'SELL' ? 'ขาย' : 'ซื้อ';
            if(confirm(`ยืนยันการบันทึกข้อมูลการ ${actionText} สำหรับถาดที่ ${lotId}?`)) {
                alert(`ระบบกำลังพัฒนาส่วนบันทึกข้อมูล... \n(คุณต้อมกด ${actionText} ใน Gold2Go แล้วค่อยมาอัปเดตสถานะในนี้ครับ)`);
            }
        }

        // เริ่มทำงานเมื่อโหลดหน้าเว็บ
        window.onload = fetchInventory;
    </script>
</body>
</html>
